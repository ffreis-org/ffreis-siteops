version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    # Correctness
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused

    # Security
    - gosec

    # Bugs
    - bodyclose
    - noctx

    # Maintainability
    - godot
    - nolintlint

    # Style
    - misspell

  settings:
    govet:
      enable:
        - copylocks
    errcheck:
      check-type-assertions: true
      check-blank: false
    godot:
      scope: declarations
      capital: false

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      - linters:
          - all
        path: vendor/
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - ffreis-siteops
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
