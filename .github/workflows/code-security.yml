name: Security (govulncheck)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-security.yml@083c0960905ce8381b4e8e6e28d082110bd47525
