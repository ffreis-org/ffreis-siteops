name: Siteops Code Security (Go)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true
      - name: Download govulncheck dependencies
        run: go mod tidy
      - name: Install govulncheck (reproducible)
        run: go install golang.org/x/vuln/cmd/govulncheck@"$(go list -m -f '{{.Version}}' golang.org/x/vuln)"
      - name: Run govulncheck
        run: govulncheck ./...
