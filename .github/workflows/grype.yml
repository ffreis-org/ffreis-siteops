name: Siteops Container/FS Vulnerability Scan (Grype)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'

permissions:
  security-events: write

jobs:
  grype:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          path: ./
          output-format: sarif
          output-file: grype.sarif
      - name: Normalize SARIF output path
        shell: bash
        run: |
          set -euo pipefail
          sarif_out="${{ steps.scan.outputs.sarif }}"
          if [ -n "${sarif_out}" ] && [ -s "${sarif_out}" ]; then
            if [ "${sarif_out}" != "grype.sarif" ]; then
              cp "${sarif_out}" grype.sarif
            fi
          fi
      - name: Validate SARIF output
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s grype.sarif ]; then
            echo "grype.sarif was not generated or is empty" >&2
            echo "Available SARIF files in workspace:" >&2
            find . -maxdepth 4 -type f -name '*.sarif' -print >&2 || true
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: siteops-grype-sarif
          path: grype.sarif
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype.sarif
