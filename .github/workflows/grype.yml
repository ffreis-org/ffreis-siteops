name: Siteops Container/FS Vulnerability Scan (Grype)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'

permissions:
  security-events: write

jobs:
  grype:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          path: ./
          output-format: sarif
          output-file: grype.sarif
      - name: Normalize SARIF output path
        shell: bash
        run: |
          set -euo pipefail
          sarif_out="${{ steps.scan.outputs.sarif }}"
          if [ -n "${sarif_out}" ] && [ -s "${sarif_out}" ]; then
            if [ "${sarif_out}" != "grype.sarif" ]; then
              cp "${sarif_out}" grype.sarif
            fi
          fi
      - name: Validate SARIF output
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s grype.sarif ]; then
            echo "grype.sarif was not generated or is empty" >&2
            echo "Available SARIF files in workspace:" >&2
            find . -maxdepth 4 -type f -name '*.sarif' -print >&2 || true
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: siteops-grype-sarif
          path: grype.sarif
      - uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: grype.sarif
