name: Filesystem Vulnerability Scan (Grype)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grype:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scan-grype-fs.yml@57c46cfaf3b815c97c58983ae2be73fb85573fb6
    with:
      path: "."
      upload-sarif: true
