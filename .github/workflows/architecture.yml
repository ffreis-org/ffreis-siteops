name: Siteops Architecture

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true
      - name: Ensure expected directories exist
        run: |
          test -d cmd
          test -d internal
      - name: Package graph check
        run: go list ./... >/dev/null
