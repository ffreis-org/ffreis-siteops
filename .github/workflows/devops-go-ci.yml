name: DevOps / Go CI

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod-tidy:
    timeout-minutes: 15
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mod-tidy-check.yml@706807616c7887b62bf1f5c72050db843add3828
    with:
      go-version: "1.25.8"
      working-directory: "."

  fmt:
    timeout-minutes: 15
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@706807616c7887b62bf1f5c72050db843add3828
    with:
      go-version: "1.25.8"
      working-directory: "."

  lint:
    timeout-minutes: 15
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@706807616c7887b62bf1f5c72050db843add3828
    with:
      go-version: "1.25.8"
      working-directory: "."

  test:
    timeout-minutes: 30
    if: ${{ !github.event.pull_request.draft }}
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@706807616c7887b62bf1f5c72050db843add3828
    with:
      go-version: "1.25.8"
      working-directory: "."

