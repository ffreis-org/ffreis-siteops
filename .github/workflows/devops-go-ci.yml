name: DevOps / Go CI

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod-tidy:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mod-tidy-check.yml@main
    with:
      go-version: "1.25.8"
      working-directory: "."

  fmt:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@main
    with:
      go-version: "1.25.8"
      working-directory: "."

  lint:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@main
    with:
      go-version: "1.25.8"
      working-directory: "."

  test:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@main
    with:
      go-version: "1.25.8"
      working-directory: "."

