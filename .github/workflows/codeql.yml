name: CodeQL

on:
  schedule:
    - cron: "24 21 3 * *"  # monthly scattered (was: 0 0 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-codeql.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      languages: "go"

