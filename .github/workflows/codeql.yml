name: CodeQL

on:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      languages: "go"

