name: Security - SAST (Semgrep)

on:
  workflow_dispatch:
  schedule:
    - cron: "14 0 7 * *"  # monthly scattered (was: 0 8 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-semgrep.yml@main

