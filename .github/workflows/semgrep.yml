name: Stitcher Semgrep Code Analysis

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'

permissions:
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      - name: Install semgrep
        run: pip install semgrep
      - name: Run semgrep
        run: semgrep scan --config p/default --sarif --output semgrep.sarif .
      - name: Validate SARIF output
        shell: bash
        run: |
          set -euo pipefail
          test -s semgrep.sarif || (echo "semgrep.sarif was not generated or is empty" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: stitcher-semgrep-sarif
          path: semgrep.sarif
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
