name: Security - SAST (Semgrep)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-semgrep.yml@main
