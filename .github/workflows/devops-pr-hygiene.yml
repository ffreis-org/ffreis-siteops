name: DevOps / PR Hygiene

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semantic-pr:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-semantic-pr.yml@57eb7931df140778320ad28cd5a63cbb11c553ba

  actionlint:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-actionlint.yml@57eb7931df140778320ad28cd5a63cbb11c553ba
    with:
      working-directory: "."

  labeler:
    if: github.event_name == 'pull_request_target'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-labeler.yml@57eb7931df140778320ad28cd5a63cbb11c553ba
    with:
      rules-json: |-
        [
          {"label":"ci","patterns":[".github/workflows/**",".github/actions/**"]},
          {"label":"go","patterns":["**/*.go","go.mod","go.sum"]},
          {"label":"docs","patterns":["**/*.md"]}
        ]

