name: Siteops Lock Sync

on:
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true
      - run: |
          go mod tidy
          go mod verify
          files=(go.mod)
          if [ -f go.sum ]; then
            files+=(go.sum)
          fi
          git diff --exit-code -- "${files[@]}" || (echo 'go.mod/go.sum not tidy' && exit 1)
