name: Siteops Lock Sync

on:
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.8'
          cache: true
      - run: |
          go mod tidy
          go mod verify
          files=(go.mod)
          if [ -f go.sum ]; then
            files+=(go.sum)
          fi
          git diff --exit-code -- "${files[@]}" || (echo 'go.mod/go.sum not tidy' && exit 1)
