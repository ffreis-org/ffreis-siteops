name: E2E Smoke

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    timeout-minutes: 30
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.8'
          cache: true
      - name: Build siteops binary
        run: go build -o siteops ./cmd/siteops
      - name: Create mock compiler
        run: |
          cat > /tmp/mock-website-compiler.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          command_name="${1:-}"
          shift || true
          out=""
          while [ $# -gt 0 ]; do
            case "$1" in
              -out)
                out="$2"
                shift 2
                ;;
              *)
                shift
                ;;
            esac
          done
          [ -n "$out" ] || { echo "missing -out" >&2; exit 1; }
          mkdir -p "$out"
          printf '<html><body>%s ok</body></html>\n' "$command_name" > "$out/index.html"
          EOF
          chmod +x /tmp/mock-website-compiler.sh
      - name: Siteops build smoke
        run: |
          cat > /tmp/siteops-ci.yaml <<'EOF'
          project_name: "ci"
          compiler_command: "/tmp/mock-website-compiler.sh"
          website_root: "."
          out_dir: "/tmp/siteops-dist"
          default_addr: ":8080"
          container_command: "podman"
          compose_command: ["./compose.sh"]
          compose_file: "./docker-compose.yml"
          compose_env: {}
          EOF
          ./siteops -config /tmp/siteops-ci.yaml build-inline
          test -f /tmp/siteops-dist/index.html
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: siteops-built-site
          path: /tmp/siteops-dist
