name: Examples

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true
      - name: Build siteops binary
        run: go build -o siteops ./cmd/siteops
      - name: Create mock compiler
        run: |
          cat > /tmp/mock-website-compiler.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          out=""
          while [ $# -gt 0 ]; do
            case "$1" in
              -out)
                out="$2"
                shift 2
                ;;
              *)
                shift
                ;;
            esac
          done
          [ -n "$out" ] || { echo "missing -out" >&2; exit 1; }
          mkdir -p "$out"
          printf '<html><body>example ok</body></html>\n' > "$out/index.html"
          EOF
          chmod +x /tmp/mock-website-compiler.sh
      - name: Example build from temporary config
        run: |
          cat > /tmp/siteops-example.yaml <<'EOF'
          project_name: "example"
          compiler_command: "/tmp/mock-website-compiler.sh"
          website_root: "."
          out_dir: "/tmp/siteops-example-dist"
          default_addr: ":8080"
          container_command: "podman"
          compose_command: ["./compose.sh"]
          compose_file: "./docker-compose.yml"
          compose_env: {}
          EOF
          ./siteops -config /tmp/siteops-example.yaml build
          test -f /tmp/siteops-example-dist/index.html
