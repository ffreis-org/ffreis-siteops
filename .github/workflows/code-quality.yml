name: Stitcher Code Quality (Sonar)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

jobs:
  require-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail
          [ -n "${SONAR_TOKEN}" ] || (echo "Missing required secret: SONAR_TOKEN" >&2; exit 1)
          [ -n "${SONAR_HOST_URL}" ] || (echo "Missing required secret: SONAR_HOST_URL" >&2; exit 1)

  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true
      - name: Coverage for Sonar
        run: go test ./... -coverprofile=coverage.out
      - uses: SonarSource/sonarqube-scan-action@v4
        # if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }} # Disabled: context 'secrets' not allowed here
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=ffreis-website-stitcher
            -Dsonar.go.coverage.reportPaths=coverage.out
