name: Siteops Code Quality (Sonar)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  sonar:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-sonar.yml@706807616c7887b62bf1f5c72050db843add3828
    with:
      go-version: "1.25.8"
      working-directory: "."
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
