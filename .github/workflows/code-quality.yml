name: Siteops Code Quality (Sonar)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-sonar.yml@a543ef895b5c2d6e4e7fe87245d440889c485b7c
    with:
      go-version: "1.25.8"
      working-directory: "."
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
