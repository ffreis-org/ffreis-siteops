name: Siteops Code Review (Lint + Test)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true
      - name: Format Check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "$out"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Unit Tests
        run: go test ./...
