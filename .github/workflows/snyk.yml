name: Stitcher Security Scan (Snyk)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

permissions:
  security-events: write

jobs:
  require-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${SNYK_TOKEN}" ] || (echo "Missing required secret: SNYK_TOKEN" >&2; exit 1)

  snyk:
    runs-on: ubuntu-latest
    if: ${{ secrets.SNYK_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name: Install Snyk
        run: npm install -g snyk
      - name: Snyk OSS Test (Go)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --file=go.mod --sarif-file-output=snyk.sarif || true
      - name: Validate SARIF output
        shell: bash
        run: |
          set -euo pipefail
          test -s snyk.sarif || (echo "snyk.sarif was not generated or is empty" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: stitcher-snyk-sarif
          path: snyk.sarif
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif
