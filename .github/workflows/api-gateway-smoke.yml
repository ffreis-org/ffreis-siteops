name: Siteops API Gateway Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '52 22 12 * *'  # monthly scattered (was: 20 4 * * *)

jobs:
  require-secrets:
    timeout-minutes: 15
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Validate required secrets
        shell: bash
        env:
          SITEOPS_SMOKE_BASE_URL: ${{ secrets.SITEOPS_SMOKE_BASE_URL }}
        run: |
          set -euo pipefail
          [ -n "${SITEOPS_SMOKE_BASE_URL}" ] || (echo "Missing required secret: SITEOPS_SMOKE_BASE_URL" >&2; exit 1)

  smoke:
    timeout-minutes: 15
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Smoke checks
        # if: ${{ secrets.SITEOPS_SMOKE_BASE_URL != '' }} # Disabled: context 'secrets' not allowed here
        env:
          BASE: ${{ secrets.SITEOPS_SMOKE_BASE_URL }}
        run: |
          set -euo pipefail
          curl -fsS "$BASE/" >/dev/null
          curl -fsS "$BASE/index.html" >/dev/null
