project_name: "my-website"

# Compiler CLI executable path (installed website-compiler command is recommended)
compiler_command: "website-compiler"

# Website source and output
website_root: "../path-to-your-website"
out_dir: "../path-to-build-output"
# Optional: override site data source. If omitted, the compiler uses
# <website_root>/src/data/site.yaml when present.
site_data_source: ""
# Optional: if set, compiler auto-generates sitemap.xml from page templates
# when no sitemap.yaml is present inside the website root.
sitemap_base_url: "https://www.example.com"
# Optional: mirror external CSS/JS/image/font URLs into dist/ and rewrite references.
mirror_external_assets: false
default_addr: ":8080"

# Podman-first but overridable
container_command: "podman"

# Compose shim command + compose file path
compose_command:
  - "../compose.sh"
compose_file: "../docker-compose.yml"
compose_env:
  WORKSPACE_ROOT: "."
  WEBSITE_ROOT: "path-to-your-website"
  OUT_DIR: "path-to-build-output"
  INLINE_ASSETS: "false"
  COPY_ASSETS: "true"
  COMPILER_WATCH_PATH: "."
  # Image model aligned with ffreis-python-onnx-model-converter
  PREFIX: "myorg"
  IMAGE_PROVIDER: ""
  IMAGE_TAG: "local"
  COMPILER_IMAGE_NAME: "website-compiler-cli"
  COMPILER_WATCH_IMAGE_NAME: "website-compiler-watch"
  # Optional full override for compiler-watch image.
  COMPILER_WATCH_IMAGE: "myorg/website-compiler-watch:local"
  # Optional full override for compiler image used in compiler-watch build.
  WEBSITE_COMPILER_IMAGE: "myorg/website-compiler-cli:local"
  # Optional override for compiler-watch runtime base image.
  COMPILER_WATCH_RUNTIME_IMAGE: "debian:bookworm-slim"
  # Optional full override for preview container image
  PREVIEW_IMAGE: "nginx:alpine"

# Optional: publish the built site to S3 (bucket-per-domain recommended).
publish:
  bucket: "example.com"
  # Prefix to sync into. Use "/" to publish to bucket root.
  prefix: "/"
  no_delete: false
  # Optional S3 region override.
  region: ""
  # Optional: CloudFront invalidation after publish.
  cloudfront_distribution_id: ""
  cloudfront_invalidate_paths:
    - "/*"
