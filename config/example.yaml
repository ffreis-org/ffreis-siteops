project_name: "my-website"

# Path to the compiled website-compiler binary.
compiler_command: "../website-compiler/website-compiler"

# Local checkout of the website source and output directory.
website_root: "../../my-website/my-website"
out_dir:      "../../my-website/my-website/dist"
site_data_source: ""
sitemap_base_url: "https://www.example.com"
mirror_external_assets: false
default_addr: ":8080"

container_command: "docker"

# ── deploy (production) ──────────────────────────────────────────────────────
# Points compose at website-deployer/ for the publisher + invalidator services.
compose_command:
  - "../../../website-deployer/compose.sh"
compose_file: "../../../website-deployer/docker-compose.yml"
compose_env:
  WORKSPACE_ROOT:   "../.."
  WEBSITE_ROOT:     "my-website/my-website"
  OUT_DIR:          "my-website/my-website/dist"
  PREFIX:           "my-org"
  IMAGE_PROVIDER:   ""
  IMAGE_TAG:        "local"
  COMPILER_IMAGE_NAME: "website-compiler-cli"
  STITCHER_IMAGE_NAME: "website-compiler-watch"
  # Required by the publisher and invalidator services in docker-compose.yml.
  PUBLISH_SCRIPT:    "./website/my-siteops/scripts/publish.sh"
  INVALIDATE_SCRIPT: "./website/my-siteops/scripts/cloudfront-invalidate.sh"

builds:
  bucket: "my-website-builds"
  source: "my-data"
  region: "us-east-1"

publish:
  bucket: "my-website-prod"
  prefix: "/"
  no_delete: false
  region: "us-east-1"
  cloudfront_distribution_id: ""
  cloudfront_invalidate_paths:
    - "/*"
